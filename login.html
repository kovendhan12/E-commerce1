<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Aura</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { poppins: ['Poppins','sans-serif'], inter: ['Inter','sans-serif'] },
          colors: { appleGray: '#f5f5f7', appleDark: '#1d1d1f', appleBlue: '#2997ff', accent: '#2997ff' }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="/E-commerce1/assets/login-CvK2edUm.js"></script>
  <link rel="modulepreload" crossorigin href="/E-commerce1/assets/store-DejNxuCl.js">
  <link rel="stylesheet" crossorigin href="/E-commerce1/assets/store--MSCmV81.css">
</head>
<body class="antialiased font-inter text-appleDark bg-appleGray flex flex-col min-h-screen items-center justify-center">

  <div class="w-full max-w-md px-4">
    <!-- Logo -->
    <div class="text-center mb-10">
      <a href="./index.html" class="font-poppins font-bold text-3xl tracking-tight text-appleDark">Aura.</a>
      <p class="mt-2 text-gray-500 text-sm">Sign in to continue</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-8">
      <h1 class="text-2xl font-bold font-poppins text-gray-900 mb-6">Welcome back</h1>

      <!-- Error Alert -->
      <div id="login-error" class="hidden bg-red-50 border border-red-100 text-red-600 rounded-xl px-4 py-3 text-sm mb-6 flex items-center gap-2">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        <span id="error-message">Invalid username or password.</span>
      </div>

      <form id="login-form" novalidate class="space-y-5">
        <div>
          <label for="username" class="block text-sm font-medium text-gray-700 mb-1.5">Username</label>
          <input type="text" id="username" name="username" class="input-field" placeholder="Enter username" autocomplete="username" required>
          <p id="username-error" class="mt-1 text-xs text-red-500 hidden">Username is required</p>
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
          <div class="relative">
            <input type="password" id="password" name="password" class="input-field pr-12" placeholder="Enter password" autocomplete="current-password" required>
            <button type="button" id="toggle-password" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors">
              <svg id="eye-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
            </button>
          </div>
          <p id="password-error" class="mt-1 text-xs text-red-500 hidden">Password is required</p>
        </div>

        <button type="submit" id="submit-btn" class="btn-primary w-full py-4 mt-2 text-base">
          Sign In
        </button>
      </form>

      <div class="mt-8 pt-6 border-t border-gray-100">
        <div class="text-xs text-gray-400 text-center space-y-1">
          <p><span class="font-medium">Demo credentials:</span></p>
          <p>Admin: <code class="bg-gray-100 px-1.5 py-0.5 rounded">admin</code> / <code class="bg-gray-100 px-1.5 py-0.5 rounded">admin123</code></p>
          <p>User: Any other username/password</p>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
