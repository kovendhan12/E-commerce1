<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart | Aura</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { poppins: ['Poppins','sans-serif'], inter: ['Inter','sans-serif'] },
          colors: { appleGray: '#f5f5f7', appleDark: '#1d1d1f', appleBlue: '#2997ff', accent: '#2997ff' }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="/E-commerce1/assets/cart-D8jtNkL5.js"></script>
  <link rel="modulepreload" crossorigin href="/E-commerce1/assets/store-DejNxuCl.js">
  <link rel="modulepreload" crossorigin href="/E-commerce1/assets/app-CyQ4-7Q0.js">
  <link rel="stylesheet" crossorigin href="/E-commerce1/assets/store--MSCmV81.css">
</head>
<body class="antialiased font-inter text-appleDark bg-white flex flex-col min-h-screen">

  <!-- Navigation -->
  <nav class="fixed w-full bg-white/80 backdrop-blur-md z-40 border-b border-gray-100">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16 items-center">
        <div class="flex-shrink-0">
          <a href="./index.html" class="font-poppins font-bold text-2xl tracking-tight text-appleDark">Aura.</a>
        </div>
        <div class="flex items-center gap-4">
          <a href="./products.html" class="text-sm font-medium text-gray-500 hover:text-gray-900 transition-colors">Continue Shopping</a>
          <a href="./cart.html" class="p-2 text-gray-700 relative">
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
            </svg>
            <span id="cart-count" class="absolute top-0 right-0 inline-flex items-center justify-center px-2 py-1 text-xs font-bold leading-none text-white transform translate-x-1/4 -translate-y-1/4 bg-appleBlue rounded-full" style="display: none;">0</span>
          </a>
        </div>
      </div>
    </div>
  </nav>

  <main class="flex-grow pt-24 pb-16">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
      <h1 class="text-4xl font-poppins font-bold text-gray-900 mb-10">Shopping Cart</h1>

      <!-- Empty Cart State -->
      <div id="empty-cart" class="text-center py-24 hidden">
        <div class="w-24 h-24 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-6">
          <svg class="w-12 h-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
          </svg>
        </div>
        <h2 class="text-2xl font-semibold text-gray-800 mb-3">Your cart is empty</h2>
        <p class="text-gray-500 mb-8">Looks like you haven't added anything yet.</p>
        <a href="./products.html" class="btn-primary inline-block">Explore Products</a>
      </div>

      <!-- Cart Content -->
      <div id="cart-content" class="hidden">
        <div class="lg:grid lg:grid-cols-12 lg:gap-12">
          <!-- Cart Items -->
          <div class="lg:col-span-7">
            <div id="cart-items" class="space-y-4"></div>
          </div>

          <!-- Order Summary -->
          <div class="lg:col-span-5 mt-10 lg:mt-0">
            <div class="bg-appleGray rounded-2xl p-8 sticky top-24">
              <h2 class="text-xl font-semibold text-gray-900 mb-6">Order Summary</h2>
              <div class="space-y-4">
                <div class="flex justify-between text-gray-600">
                  <span>Subtotal</span>
                  <span id="subtotal">$0.00</span>
                </div>
                <div class="flex justify-between text-gray-600">
                  <span>Shipping</span>
                  <span class="text-green-600 font-medium">Free</span>
                </div>
                <div class="border-t border-gray-200 pt-4 flex justify-between">
                  <span class="text-lg font-semibold">Total</span>
                  <span id="order-total" class="text-lg font-bold text-appleBlue">$0.00</span>
                </div>
              </div>
              <button class="btn-primary w-full mt-8 text-center block text-lg">
                Checkout
              </button>
              <p class="text-center text-sm text-gray-500 mt-4">Secure checkout powered by Aura</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="bg-white border-t border-gray-100 mt-auto">
    <div class="max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8">
      <p class="text-center text-sm text-gray-400">&copy; 2026 Aura Inc. All rights reserved.</p>
    </div>
  </footer>

</body>
</html>
